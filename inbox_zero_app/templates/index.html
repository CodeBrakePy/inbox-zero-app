<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inbox Triage Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <main class="app-shell">
        <header class="workspace-header">
            <div>
                <p class="eyebrow">Local email triage</p>
                <h1>Today&rsquo;s Inbox</h1>
            </div>
            <form class="search-form" method="get" action="/">
                <input type="search" name="q" value="$query" placeholder="Search imported email">
                <button type="submit">Search</button>
            </form>
        </header>

        $error_banner

        <section class="dashboard-summary" aria-label="Today's inbox summary">
            $dashboard_rows
        </section>

        <a class="$decision_button_class" href="$decision_href">
            <span>Human Decision Queue</span>
            <strong>$decision_count</strong>
        </a>

        <nav class="criteria-tabs" aria-label="Triage categories">
            $category_tabs
        </nav>

        <section class="triage-workspace" aria-label="Email triage workspace">
            <aside class="message-list" aria-label="Email list">
                $message_list
            </aside>
            $detail_panel
        </section>
    </main>
</body>
</html>
